name: Aerothai Auto-Pilot Bot

on:
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Scraping Bot
        env:
          AEROTHAI_USER: ${{ secrets.AEROTHAI_USER }}
          AEROTHAI_PASS: ${{ secrets.AEROTHAI_PASS }}
        run: python bot.py

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Old_Way_Screenshot
          path: old_way_result.png
